name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate inline JS syntax (index.html + sw.js)
        run: |
          node --check sw.js
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('index.html', 'utf8');
            const re = /<script(?![^>]*\bsrc=)[^>]*>([\s\S]*?)<\/script>/g;
            let m, joined = '';
            while ((m = re.exec(html))) joined += '\n//---SPLIT---\n' + m[1];
            fs.writeFileSync('/tmp/_inline.js', joined);
          "
          node --check /tmp/_inline.js
      - name: Validate JSON assets
        run: |
          node -e "JSON.parse(require('fs').readFileSync('tags-danbooru.json', 'utf8'))"
      - name: Run unit tests (pure functions)
        run: npm test
