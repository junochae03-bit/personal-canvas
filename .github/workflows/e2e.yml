name: E2E (Playwright)

# CI(빠른 lint/test) 와 분리 — Playwright 는 브라우저 다운로드 ~80MB, 시간 ~2분.
# PR · main push · 수동 트리거. (E2E 는 production 안정성용이라 main 머지 후 검증 권장.)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # ⚠ cache: 'npm' 제거 — .gitignore 에 package-lock.json 이 포함됨.
          # npm install 자체는 빠르고 (devDep 1개), Playwright 브라우저는 actions/cache@v4 로 별도 캐싱.

      - name: Install dependencies
        run: npm install

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install Playwright browser (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # 캐시 히트 시 브라우저 바이너리는 복원되지만 OS 레벨 의존성(libnss 등)은 캐시되지 않음.
      # 런처 실패를 막기 위해 시스템 의존성만 별도 설치.
      - name: Install Playwright system deps (on cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run smoke tests
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
